<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>withdraw credit-Nyondo Hardware</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <h3>Withdraw Goods</h3>
        <div class="withdraw">
          <div class="mb-3">
            <label for="formGroupExampleInput" class="form-label"
              >Select Customer</label
            >
            <select>
              <option selected>Select customer</option>
              <option value="1"></option>
              <option value="2"></option>
              <option value="3"></option>
            </select>
          </div>
          <div class="mb-3">
            <label for="formGroupExampleInput2" class="form-label"
              >Select Item</label
            >
            <select>
              <option value="Cement cem iiN">Cement cem iiN</option>
              <option value="Cement cem iiiN">Cement cem iiiN</option>
              <option value="Iron bars 10mm">Iron bars 10mm</option>
              <option value="Iron bars 12mm">Iron bars 12mm</option>
              <option value="Iron bars 16mm">Iron bars 16mm</option>
              <option value="Nails 1 inc">Nails 1 inc</option>
              <option value="Nails 2 inc">Nails 2 inc</option>
              <option value="Nails 3 inc">Nails 3 inc</option>
              <option value="Roofings Nails (5Kgs)">
                Roofings Nails (5Kgs)
              </option>
              <option value="Wheelbarrow">Wheelbarrow</option>
              <option value="Wire Mesh">Wire Mesh</option>
              <option value="Barbed Wires high tensiles">
                Barbed Wires high tensiles
              </option>
              <option value="Barbed Wires low tensiles">
                Barbed Wires low tensiles
              </option>
              <option value="Iron sheets">Iron sheets</option>
              <option value="3">Three</option>
            </select>
          </div>
        </div>
        <div class="mb-3">
          <label for="quantity" class="form-label">Quantity</label>
          <input
            type="number"
            class="form-control"
            id="formGroupExampleInput"
            placeholder="Example input placeholder"
          />
        </div>
        <button type="button" class="btn btn-primary btn-lg">
          Withdraw Goods
        </button>
        <button type="button" class="btn btn-secondary btn-lg">Cancel</button>
      </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
</body>
</html>
