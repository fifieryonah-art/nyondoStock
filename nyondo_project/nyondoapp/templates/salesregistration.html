<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Entry-Nyondo Hardware</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  
    
</head>
<body>
    <h1 class="text-center">Nyondo Hardware</h1>

<div class="container-fluid"> 
    <!-- mx stands for margin axis -->
    <div class="row g-3 my-3">
  <div class="col-sm-3">
      <label for="customername" class="form-label">Customer Name</label>

    <input type="text" class="form-control" placeholder="" aria-label="">
  </div>
  <div class="col-sm">
      <label for="customertype" class="form-label">Customer Type</label>

    <!-- <input type="text" class="form-control" placeholder="State" aria-label="State"> -->
     <select class="form-select" id="autoSizingSelect">
      <option selected>Choose customer type</option>
      <option value="individual">Individual</option>
      <option value="Retailer">Retail</option>
      <option value="Wholesale">Wholesale</option>
    </select>
  </div>
  <div class="col-sm">
      <label for="basic-url" class="form-label">Distance(km)</label>

    <input type="number" class="form-control" placeholder="" aria-label="">
  </div>
</div>
  
  <div class="row g-4 my-3">
  <div class="col-sm-3">
    <label for="productname" class="form-label">Product Name</label>
    <!-- <input type="text" class="form-control" placeholder="City" aria-label="City"> -->
     <select class="form-select" id="inputGroupSelect02">
    <option selected>Choose...</option>
    <option value="Cement cem iiN">Cement cem iiN</option>
    <option value="Cement cem iiiN">Cement cem iiiN</option>
    <option value="Iron bars 10mm">Iron bars 10mm</option>
    <option value="Iron bars 12mm">Iron bars 12mm</option> 
    <option value="Iron bars 16mm">Iron bars 16mm</option>
    <option value="Nails 1 inc">Nails 1 inc</option>
    <option value="Nails 2 inc">Nails 2 inc</option> 
    <option value="Nails 3 inc">Nails 3 inc</option> 
    <option value="Roofings Nails (5Kgs)">Roofings Nails (5Kgs)</option> 
    <option value="Wheelbarrow">Wheelbarrow</option> 
    <option value="Wire Mesh">Wire Mesh</option> 
    <option value="Barbed Wires high tensiles">Barbed Wires high tensiles</option> 
    <option value="Barbed Wires low tensiles">Barbed Wires low tensiles</option> 
    <option value="Iron sheets">Iron sheets</option> 
    <option value="3">Three</option>
    
  </select>
  </div>
  <div class="col-sm">
    <label for="quantity" class="form-label">Quantity</label>
    <input type="number" class="form-control" placeholder="" aria-label="">
  </div>
  <div class="col-sm">
    <label for="unitprice" class="form-label">Unit Price</label>
    <input type="number" class="form-control" placeholder="" aria-label="">
  </div>
  <div class="col-sm-3 justfycontent-center">
      <!-- <label for="additem" class="form-label bg-warnig">ADD ITEM</label> -->

    <input type="text" class="form-control mt-2 bg-danger" placeholder="+ADD ITEM" aria-label="ADD ITEM">
  </div>
</div>
<div class="d-flex justify-content-center gap-5">
<button type="button" class="btn btn-outline-primary w-25">Cancel</button>
<button type="button" class="btn btn-outline-primary w-25">Complete Payment</button>
</div>
</div>


</div>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>  
</body>
</html>
